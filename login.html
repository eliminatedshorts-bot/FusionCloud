<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – FusionCloud</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0b0e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #111827;
      border: 1px solid #1f2740;
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .login-card .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 24px;
      display: block;
      border: 3px solid #f5a623;
    }
    .login-card h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #eef2f6;
      margin-bottom: 4px;
    }
    .login-card p {
      color: #7a8aaa;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }
    .login-card label {
      display: block;
      text-align: left;
      color: #bcc6dc;
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #1f2740;
      background: #0b0e1a;
      color: #eef2f6;
      font-size: 1rem;
      margin-bottom: 18px;
      outline: none;
      transition: 0.2s;
    }
    .login-card input:focus {
      border-color: #f5a623;
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
    }
    .login-card .btn-login {
      background: #f5a623;
      color: #0b0e1a;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
    }
    .login-card .btn-login:hover {
      background: #e09515;
    }
    .login-card .error {
      color: #ff5a5a;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <img src="d6c3627909947d21f2b6b2154185ab6e.webp" alt="FusionCloud" class="logo" />
    <h1>FusionCloud</h1>
    <p>Sign in to access your dashboard</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />

      <button type="submit" class="btn-login">Log In</button>
      <div class="error" id="loginError">Invalid credentials. Please try again.</div>
    </form>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('loginError');

      // Simple validation – any non-empty email/password works
      if (email.length > 0 && password.length > 0) {
        localStorage.setItem('fusionLoggedIn', 'true');
        window.location.href = 'index.html';
      } else {
        errorEl.style.display = 'block';
      }
    }

    // If already logged in, redirect to home
    if (localStorage.getItem('fusionLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
